version: '3.8'

services:
  # Infrastructure Services
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tft_trading}
      POSTGRES_USER: ${POSTGRES_USER:-tft_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  # Kafka Broker
  kafka-broker:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 5368709120
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Schema Registry
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    ports:
      - "8085:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-broker:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka-broker:
        condition: service_healthy

  # Microservices
  data-ingestion:
    build: ./microservices/data-ingestion
    ports:
      - "8001:8001"
    environment:
      - POLYGON_API_KEY=${POLYGON_API_KEY}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET}
      - KAFKA_BOOTSTRAP_SERVERS=kafka-broker:9092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      kafka-broker:
        condition: service_healthy
    restart: unless-stopped

  sentiment-engine:
    build:
      context: ./microservices/sentiment-engine
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tft_user}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-tft_trading}
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka-broker:9092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
      kafka-broker:
        condition: service_healthy
    volumes:
      - ./data/models:/app/models
    restart: unless-stopped

  tft-predictor:
    build:
      context: ./microservices/tft-predictor
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tft_user}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-tft_trading}
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka-broker:9092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_ARTIFACT_PATH=/app/models
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
      kafka-broker:
        condition: service_healthy
    volumes:
      - ./data/models:/app/models
      - ./data/mlflow:/mlflow
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  trading-engine:
    build:
      context: ./microservices/trading-engine
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tft_user}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-tft_trading}
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka-broker:9092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ALPACA_BASE_URL=https://paper-api.alpaca.markets
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
      kafka-broker:
        condition: service_healthy
    restart: unless-stopped

  orchestrator:
    build:
      context: ./microservices/orchestrator
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tft_user}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-tft_trading}
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka-broker:9092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - DATA_INGESTION_URL=http://data-ingestion:8001
      - SENTIMENT_ENGINE_URL=http://sentiment-engine:8002
      - TFT_PREDICTOR_URL=http://tft-predictor:8003
      - TRADING_ENGINE_URL=http://trading-engine:8004
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
      kafka-broker:
        condition: service_healthy
      data-ingestion:
        condition: service_started
      sentiment-engine:
        condition: service_started
      tft-predictor:
        condition: service_started
      trading-engine:
        condition: service_started
    restart: unless-stopped

  mlflow:
    image: python:3.11-slim
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://${POSTGRES_USER:-tft_user}:${POSTGRES_PASSWORD:?required}@postgres:5432/mlflow
    depends_on:
      - postgres
    volumes:
      - ./data/mlflow:/mlflow
    command: >
      bash -c "
        pip install mlflow psycopg2-binary &&
        mlflow server --backend-store-uri postgresql://${POSTGRES_USER:-tft_user}:${POSTGRES_PASSWORD:?required}@postgres:5432/mlflow --default-artifact-root /mlflow --host 0.0.0.0 --port 5000
      "
    restart: unless-stopped
    # For GPU support (uncomment if you have NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # NOTE: tft-predictor, trading-engine, orchestrator defined above (lines 59-125).
  # Duplicate definitions removed to fix YAML parsing.

  # APEX Paper Trader — Multi-Strategy Ensemble Runner
  paper-trader:
    build:
      context: .
      dockerfile: paper-trader/Dockerfile
    ports:
      - "8010:8010"
    environment:
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ALPACA_BASE_URL=${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=tft_trading
      - DB_USER=${POSTGRES_USER:-tft_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?required}
      - REDIS_URL=redis://redis:6379
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - PAPER_TRADING_SYMBOLS=${PAPER_TRADING_SYMBOLS:-AAPL,MSFT,GOOGL,AMZN,NVDA,META,TSLA,JPM,BAC,XOM}
      - PAPER_FX_PAIRS=${PAPER_FX_PAIRS:-EURUSD,GBPUSD,USDJPY,AUDUSD,USDCAD,USDCHF}
      - PAPER_SCHEDULE_HOUR=${PAPER_SCHEDULE_HOUR:-10}
      - PAPER_SCHEDULE_MINUTE=${PAPER_SCHEDULE_MINUTE:-0}
      - PAPER_INITIAL_CAPITAL=${PAPER_INITIAL_CAPITAL:-100000}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./strategies:/app/strategies
      - ./trading:/app/trading

  # Monitoring Services
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD env var is required}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning

  # Optional: Kafka UI for debugging
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    depends_on:
      kafka-broker:
        condition: service_healthy

  # Optional: Redis Commander for debugging
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  postgres_data:
  kafka_data:
  grafana_data:

networks:
  default:
    external:
      name: tft_network
